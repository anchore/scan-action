name: "Release"

permissions: {}

# there should never be two releases in progress at the same time
concurrency:
  group: release
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      version:
        description: tag the latest commit on main with the given version (prefixed with v)
        required: true

jobs:
  version-available:
    uses: anchore/workflows/.github/workflows/check-version-available.yaml@b3e328b5ae31ba96297e2ed9a6124e5e6352a4c5 # v0.7.0
    permissions:
      contents: read # for getting existing tags
    with:
      version: ${{ github.event.inputs.version }}

  check-gate:
    permissions:
      checks: read # required for getting the status of specific check names
    uses: anchore/workflows/.github/workflows/check-gate.yaml@b0c30a80409130d329aaa356fd64a34d8c0b3375 # v0.7.2
    with:
      # these are checks that must pass on main before a release can be cut.
      # changing a name here requires updating the matching job name in validations.yaml.
      checks: '["Static analysis", "Build", "Unit tests", "Integration tests", "Action matrix"]'

  release:
    needs: [check-gate, version-available]
    environment: release # gates release on required reviewers; provides DEPLOY_KEY secret
    runs-on: ubuntu-24.04
    permissions:
      contents: read # tag pushes go via deploy key, not GITHUB_TOKEN
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # full history is needed for changelog generation
          persist-credentials: false

      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap

      - name: Verify dist/ is up-to-date
        run: |
          make build
          git status --porcelain
          git diff --exit-code

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: make ci-release
