name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '38 11 * * 3'

permissions: {}

jobs:
  analyze:
    name: Analyze
    uses: anchore/workflows/.github/workflows/codeql.yaml@add-python-js-codeql
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    with:
      languages: 'javascript,actions'
