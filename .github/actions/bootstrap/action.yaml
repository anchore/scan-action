name: "Bootstrap"

description: "Bootstrap node + go-make tooling and install npm dependencies"

inputs:
  install-deps:
    description: "Run npm ci to install node dependencies"
    default: "true"

runs:
  using: "composite"
  steps:
    # setup go, go-make, binny, and cache go modules (this is also what
    # restricts cache writes to the default branch, per audit guidance)
    - uses: anchore/go-make/.github/actions/setup@9de27be11ed73e2f9d5406a836a492b7d8aa1225 # v0.5.0
      with:
        cache-dependency-path: .make/go.sum

    - name: Setup node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: package.json
        cache: npm

    - name: Install npm dependencies
      if: inputs.install-deps == 'true'
      shell: bash
      run: npm ci
